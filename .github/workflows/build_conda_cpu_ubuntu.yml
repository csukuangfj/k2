# refer to https://github.com/actions/starter-workflows/pull/47/files


# Note, we have to set
#
# export DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib/python3.8/site-packages:$DYLD_LIBRARY_PATH
#
# before running `python3 -m k2.version`
#
# See https://github.com/openPMD/openPMD-api/issues/593#issuecomment-552690470


name: build_conda_cpu_ubuntu

on:
  push:
    branches:
      - conda-cpu
      - fix-ci

env:
  K2_BUILD_TYPE: Release

jobs:
  build_conda_cpu_ubuntu:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:16.04
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.6, 3.7, 3.8, 3.9]
        # from https://download.pytorch.org/whl/torch_stable.html
        #
        # PyTorch 1.10, 1.9.x, 1.8.x, and 1.7.1 support 3.6, 3.7, 3.8, 3.9
        # PyTorch 1.7.0, 1.6.0, and 1.5.x support 3.6, 3.7, 3.8
        #
        # Other PyTorch versions are not tested
        #
        torch: ["1.5.0", "1.5.1", "1.6.0", "1.7.0", "1.7.1", "1.8.0", "1.8.1", "1.9.0", "1.9.1", "1.10"]
        exclude:
          - python-version: 3.9 # exclude Python 3.9 for [1.5.0, 1.5.1, 1.6.0, 1.7.0]
            torch: "1.5.0"
          - python-version: 3.9
            torch: "1.5.1"
          - python-version: 3.9
            torch: "1.6.0"
          - python-version: 3.9
            torch: "1.7.0"

    steps:
      # refer to https://github.com/actions/checkout
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Install anaconda
        shell: bash -l {0}
        run: |
          apt-get update
          apt-get install -y wget build-essential git lsb-release
          wget -q https://repo.anaconda.com/archive/Anaconda3-2021.05-Linux-x86_64.sh
          chmod +x Anaconda3-2021.05-Linux-x86_64.sh
          ./Anaconda3-2021.05-Linux-x86_64.sh -b
      - name: Setup conda
        shell: bash -l {0}
        run: |
          echo "$HOME/anaconda3/bin" >> $GITHUB_PATH
          echo "path: $GITHUB_PATH"

          source ~/anaconda3/etc/profile.d/conda.sh

          conda install -y python=${{ matrix.python-version }} cmake=3.18
          export PATH=/github/home/anaconda3/bin:$PATH

          python --version
          python3 --version
          conda env list
          conda info
          conda activate base
          conda info

          conda install -y -q -c pytorch pytorch=${{ matrix.torch }} cpuonly
          export K2_PYTHON_VERSION=${{ matrix.python-version}}
          export K2_TORCH_VERSION=${{ matrix.torch }}
          export K2_CONDA_TOKEN=${{ secrets.K2_CONDA_TOKEN}}
          export K2_IS_GITHUB_ACTIONS=1
          export K2_IS_FOR_CONDA=1
          export K2_BUILD_TYPE=$K2_BUILD_TYPE

          mkdir -p /github/home/.conda/pkgs

          ./scripts/build_conda_cpu.sh

      - name: Display generated files
        run: |
          ls -lh /github/home/anaconda3/conda-bld/linux-64/k2-*.tar.bz2

      - name: Upload generated files
        uses: actions/upload-artifact@v2
        with:
          name: torch-${{ matrix.torch }}-python-${{ matrix.python-version }}-ubuntu-16.04
          # path: /github/home/anaconda3/conda-bld/linux-64/k2-1.10.dev20211208-cpu_py3.8_torch1.7.1.tar.bz2
          path: /github/home/anaconda3/conda-bld/linux-64/k2-*.tar.bz2
