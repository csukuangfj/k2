name: build-wheels-cpu-macos-m1

on:
  push:
    branches:
      - macos-m1-wheel
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-wheels-cpu-macos-m1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_build_matrix:
    if: github.repository_owner == 'csukuangfj' || github.repository_owner == 'k2-fsa'
    # see https://github.com/pytorch/pytorch/pull/50633
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Generating build matrix
        id: set-matrix
        run: |
          # outputting for debugging purposes
          python ./scripts/github_actions/generate_build_matrix.py --for-macos-m1 --test-only-latest-torch
          MATRIX=$(python ./scripts/github_actions/generate_build_matrix.py --for-macos-m1 --test-only-latest-torch)
          echo "::set-output name=matrix::${MATRIX}"

  build_wheels_macos_cpu_m1:
    needs: generate_build_matrix
    name: ${{ matrix.torch }} ${{ matrix.python-version }}
    runs-on: flyci-macos-large-latest-m1
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.generate_build_matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PyTorch ${{ matrix.torch }}
        shell: bash
        run: |
          python3 -m pip install -qq --upgrade pip
          python3 -m pip install -qq wheel twine dataclasses
          python3 -m pip install -qq torch==${{ matrix.torch }} numpy cmake

          python3 -c "import torch; print('torch version:', torch.__version__)"

      - name: Build wheel
        shell: bash
        run: |
          export K2_CMAKE_ARGS="-DCMAKE_BUILD_TYPE=$BUILD_TYPE -DK2_WITH_CUDA=OFF"
          export K2_MAKE_ARGS="-j2"
          python3 setup.py bdist_wheel
          python3 setup.py install
          ls -lh dist
          python3 -m k2.version
          python3 setup.py clean
          python3 -m k2.version

      - name: Display wheels
        shell: bash
        run: |

          mkdir ./wheelhouse/
          mv dist/*.whl ./wheelhouse

          ls -lh ./wheelhouse/

      - name: Upload Wheel
        uses: actions/upload-artifact@v2
        with:
          name: torch-${{ matrix.torch }}-python-${{ matrix.python-version }}-macos-latest-cpu-m1
          path: wheelhouse/*.whl

      # https://huggingface.co/docs/hub/spaces-github-actions
      - name: Publish to huggingface
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"
            rm -rf huggingface
            export GIT_LFS_SKIP_SMUDGE=1
            git clone https://huggingface.co/csukuangfj/k2 huggingface
            cd huggingface
            git pull
            mkdir -p macos
            cp -v ../wheelhouse/*.whl ./macos
            git status
            git lfs track "*.whl"
            git add .
            git commit -m "upload macos m1 wheel for torch ${{ matrix.torch }} python ${{ matrix.python-version }}"
            git push https://csukuangfj:$HF_TOKEN@huggingface.co/csukuangfj/k2 main
