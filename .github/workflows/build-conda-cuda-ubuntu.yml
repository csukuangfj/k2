# refer to https://github.com/actions/starter-workflows/pull/47/files

name: build_conda_cuda_ubuntu

on:
  push:
    tags:
      - '*'
    branches:
      - fix-ci-3

env:
  K2_BUILD_TYPE: Release
  K2_CONDA_TOKEN: ${{ secrets.K2_CONDA_TOKEN }}

jobs:
  generate_build_matrix:
    # see https://github.com/pytorch/pytorch/pull/50633
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Generating build matrix
        id: set-matrix
        run: |
          # outputting for debugging purposes
          python scripts/github_actions/generate_build_matrix.py
          MATRIX=$(python scripts/github_actions/generate_build_matrix.py --enable-cuda)
          echo "::set-output name=matrix::${MATRIX}"

  build_conda_cuda_ubuntu:
    needs: generate_build_matrix
    runs-on: ubuntu-latest
    container:
      image: ubuntu:16.04
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.generate_build_matrix.outputs.matrix) }}

    steps:
      # refer to https://github.com/actions/checkout
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Install miniconda
        shell: bash -l {0}
        run: |
          apt-get -qq update
          apt-get -qq install -y wget build-essential git-all lsb-release curl sudo
          wget -q https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
          chmod +x Miniconda3-latest-Linux-x86_64.sh
          ./Miniconda3-latest-Linux-x86_64.sh -b

      - name: Install git-lfs
        shell: bash -l {0}
        run: |
          # see https://packagecloud.io/github/git-lfs/install
          curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | bash
          apt-get update
          apt-get install -y git-lfs

      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        shell: bash -l {0}
        env:
          cuda: ${{ matrix.cuda }}
        run: |
          source ./scripts/github_actions/install_cuda.sh
          echo "CUDA_HOME=${CUDA_HOME}" >> $GITHUB_ENV
          echo "${CUDA_HOME}/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=${CUDA_HOME}/lib:${CUDA_HOME}/lib64:${LD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Download cudnn 8.0
        shell: bash -l {0}
        env:
          cuda: ${{ matrix.cuda }}
        run: |
          ./scripts/github_actions/install_cudnn.sh

      - name: Display NVCC version
        shell: bash -l {0}
        run: |
          which nvcc
          nvcc --version

      - name: Build k2
        shell: bash -l {0}
        env:
          K2_CUDA_VERSION: ${{ matrix.cuda }}
          K2_PYTHON_VERSION: ${{ matrix.python-version}}
          K2_TORCH_VERSION: ${{ matrix.torch }}
          K2_IS_GITHUB_ACTIONS: 1
          K2_IS_FOR_CONDA: 1
        run: |
          echo "$HOME/miniconda3/bin" >> $GITHUB_PATH
          echo "path: $GITHUB_PATH"
          source ~/miniconda3/etc/profile.d/conda.sh

          conda install -y python=${{ matrix.python-version }} cmake=3.18
          export PATH=/github/home/miniconda3/bin:$PATH
          python --version
          python3 --version
          conda env list
          conda info
          conda activate base
          conda info

          conda install -y -q -c pytorch -c conda-forge pytorch=${{ matrix.torch }} cudatoolkit=${{ matrix.cuda }}
          conda install -y -q anaconda-client conda-build

          export K2_BUILD_TYPE=$K2_BUILD_TYPE

          mkdir -p /github/home/.conda/pkgs

          ./scripts/build_conda.sh

      - name: Display generated files
        run: |
          ls -lh /github/home/miniconda3/conda-bld/linux-64/k2-*.tar.bz2

      - name: Upload generated files
        uses: actions/upload-artifact@v2
        with:
          name: torch-${{ matrix.torch }}-python-${{ matrix.python-version }}-cuda-${{ matrix.cuda }}-ubuntu-16.04
          path: /github/home/miniconda3/conda-bld/linux-64/k2-*.tar.bz2
